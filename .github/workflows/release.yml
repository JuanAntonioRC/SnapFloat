name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0, v1.2.0, etc.

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: ./scripts/build-dmg.sh "${{ steps.version.outputs.VERSION }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SnapFloat ${{ steps.version.outputs.VERSION }}
          draft: false
          generate_release_notes: true
          files: build/SnapFloat-${{ steps.version.outputs.VERSION }}.dmg
